<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能电子衣橱</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#F3A4AC">
    <link rel="apple-touch-icon" href="/assets/icons/icon-192x192.png">
    <!-- Tailwind CSS v3 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <!-- 自定义Tailwind配置 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#F3A4AC',
                        secondary: '#84BECA',
                        dark: '#121212',
                        light: '#FEDAB8',
                        accent: '#EF4067',
                        red: '#BE0001'
                    },
                    fontFamily: {
                        sans: ['PingFang SC', 'Microsoft YaHei', 'system-ui', '-apple-system', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style>
        /* 玻璃态效果 */
        .glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        /* 渐变背景 */
        .gradient-bg {
            background: linear-gradient(135deg, #F3A4AC 0%, #84BECA 100%);
        }
        /* 卡片悬停效果 */
        .card-hover:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }
        /* 平滑滚动 */
        html {
            scroll-behavior: smooth;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <!-- 欢迎页面 -->
    <div id="welcome-page" class="fixed inset-0 z-50 gradient-bg flex items-center justify-center p-4">
        <div class="glass rounded-2xl p-8 max-w-md w-full">
            <h1 class="text-3xl font-bold text-dark text-center mb-6">智能电子衣橱</h1>
            <p class="text-dark text-center mb-8">减少穿搭决策时间，提升审美品质</p>
            
            <form id="user-info-form" class="space-y-4">
                <!-- 身高体重 -->
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-dark font-medium mb-2">身高 (cm)</label>
                        <input type="number" id="height" class="w-full px-4 py-2 rounded-lg glass border border-white/30" placeholder="请输入身高">
                    </div>
                    <div>
                        <label class="block text-dark font-medium mb-2">体重 (kg)</label>
                        <input type="number" id="weight" class="w-full px-4 py-2 rounded-lg glass border border-white/30" placeholder="请输入体重">
                    </div>
                </div>
                
                <!-- 身材类型 -->
                <div>
                    <label class="block text-dark font-medium mb-2">身材类型</label>
                    <div class="grid grid-cols-2 gap-2">
                        <button type="button" class="body-type-btn glass rounded-lg p-3 text-center" data-type="pear">梨型</button>
                        <button type="button" class="body-type-btn glass rounded-lg p-3 text-center" data-type="apple">苹果型</button>
                        <button type="button" class="body-type-btn glass rounded-lg p-3 text-center" data-type="h">H型</button>
                        <button type="button" class="body-type-btn glass rounded-lg p-3 text-center" data-type="hourglass">沙漏型</button>
                    </div>
                </div>
                
                <!-- 风格偏好 -->
                <div>
                    <label class="block text-dark font-medium mb-2">风格偏好 (可多选)</label>
                    <div class="grid grid-cols-3 gap-2">
                        <button type="button" class="style-btn glass rounded-lg p-2 text-center text-sm" data-style="casual">休闲</button>
                        <button type="button" class="style-btn glass rounded-lg p-2 text-center text-sm" data-style="sporty">运动</button>
                        <button type="button" class="style-btn glass rounded-lg p-2 text-center text-sm" data-style="retro">复古</button>
                        <button type="button" class="style-btn glass rounded-lg p-2 text-center text-sm" data-style="minimal">极简</button>
                        <button type="button" class="style-btn glass rounded-lg p-2 text-center text-sm" data-style="street">街头</button>
                        <button type="button" class="style-btn glass rounded-lg p-2 text-center text-sm" data-style="elegant">优雅</button>
                        <button type="button" class="style-btn glass rounded-lg p-2 text-center text-sm" data-style="oldMoney">老钱风</button>
                        <button type="button" class="style-btn glass rounded-lg p-2 text-center text-sm" data-style="american">美式</button>
                        <button type="button" class="style-btn glass rounded-lg p-2 text-center text-sm" data-style="korean">韩系</button>
                    </div>
                </div>
                
                <!-- 舞蹈课信息 -->
                <div>
                    <label class="block text-dark font-medium mb-2">舞蹈课信息</label>
                    <div class="space-y-2">
                        <select id="dance-type" class="w-full px-4 py-2 rounded-lg glass border border-white/30">
                            <option value="">请选择舞种</option>
                            <option value="ballet">芭蕾</option>
                            <option value="jazz">爵士</option>
                            <option value="hiphop">嘻哈</option>
                            <option value="latin">拉丁</option>
                        </select>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-dark font-medium mb-2">上课日</label>
                                <select id="dance-day" class="w-full px-4 py-2 rounded-lg glass border border-white/30">
                                    <option value="">请选择</option>
                                    <option value="Monday">周一</option>
                                    <option value="Tuesday">周二</option>
                                    <option value="Wednesday">周三</option>
                                    <option value="Thursday">周四</option>
                                    <option value="Friday">周五</option>
                                    <option value="Saturday">周六</option>
                                    <option value="Sunday">周日</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-dark font-medium mb-2">上课时间</label>
                                <select id="dance-time" class="w-full px-4 py-2 rounded-lg glass border border-white/30">
                                    <option value="">请选择</option>
                                    <option value="morning">上午</option>
                                    <option value="afternoon">下午</option>
                                    <option value="evening">晚上</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- 通勤方式 -->
                <div>
                    <label class="block text-dark font-medium mb-2">通勤方式</label>
                    <div class="flex items-center space-x-4">
                        <label class="flex items-center">
                            <input type="checkbox" id="by-bike" class="mr-2">
                            <span>骑自行车</span>
                        </label>
                        <label class="flex items-center">
                            <input type="checkbox" id="has-gym" class="mr-2">
                            <span>有健身计划</span>
                        </label>
                    </div>
                </div>
                
                <!-- 提交按钮 -->
                <button type="submit" class="w-full bg-gradient-to-r from-primary to-secondary text-white font-bold py-3 rounded-lg hover:opacity-90 transition-opacity">
                    开始使用
                </button>
            </form>
        </div>
    </div>

    <!-- 主页面 -->
    <div id="main-page" class="hidden min-h-screen">
        <!-- 顶部导航 -->
        <header class="gradient-bg text-white p-4 shadow-md">
            <div class="container mx-auto flex justify-between items-center">
                <h1 class="text-2xl font-bold">智能电子衣橱</h1>
                <div class="flex items-center space-x-4">
                    <div id="weather-info" class="flex items-center space-x-2">
                        <i class="fa fa-sun-o text-2xl"></i>
                        <div>
                            <div id="temperature">22°C</div>
                            <div id="weather-desc" class="text-xs">晴天</div>
                        </div>
                    </div>
                    <button id="user-profile" class="glass rounded-full w-10 h-10 flex items-center justify-center">
                        <i class="fa fa-user"></i>
                    </button>
                </div>
            </div>
        </header>

        <!-- 内容区域 -->
        <main class="container mx-auto p-4">
            <!-- 功能导航 -->
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                <button class="nav-btn glass rounded-xl p-4 text-center card-hover transition-all">
                    <div class="w-12 h-12 bg-primary/20 rounded-full flex items-center justify-center mx-auto mb-2">
                        <i class="fa fa-plus text-primary text-xl"></i>
                    </div>
                    <div class="text-dark font-medium">添加衣物</div>
                </button>
                <button class="nav-btn glass rounded-xl p-4 text-center card-hover transition-all">
                    <div class="w-12 h-12 bg-secondary/20 rounded-full flex items-center justify-center mx-auto mb-2">
                        <i class="fa fa-calendar text-secondary text-xl"></i>
                    </div>
                    <div class="text-dark font-medium">一周穿搭</div>
                </button>
                <button class="nav-btn glass rounded-xl p-4 text-center card-hover transition-all">
                    <div class="w-12 h-12 bg-accent/20 rounded-full flex items-center justify-center mx-auto mb-2">
                        <i class="fa fa-music text-accent text-xl"></i>
                    </div>
                    <div class="text-dark font-medium">舞蹈穿搭</div>
                </button>
                <button class="nav-btn glass rounded-xl p-4 text-center card-hover transition-all">
                    <div class="w-12 h-12 bg-red/20 rounded-full flex items-center justify-center mx-auto mb-2">
                        <i class="fa fa-cloud text-red text-xl"></i>
                    </div>
                    <div class="text-dark font-medium">天气穿搭</div>
                </button>
            </div>

            <!-- 衣物分类 -->
            <div class="mb-6">
                <h2 class="text-lg font-bold text-dark mb-3">衣物分类</h2>
                <div class="overflow-x-auto">
                    <div class="flex space-x-3 pb-2">
                        <button class="category-btn glass rounded-full px-4 py-2 text-dark font-medium">全部</button>
                        <button class="category-btn glass rounded-full px-4 py-2 text-dark">上衣</button>
                        <button class="category-btn glass rounded-full px-4 py-2 text-dark">裤子</button>
                        <button class="category-btn glass rounded-full px-4 py-2 text-dark">裙子</button>
                        <button class="category-btn glass rounded-full px-4 py-2 text-dark">鞋子</button>
                        <button class="category-btn glass rounded-full px-4 py-2 text-dark">配饰</button>
                        <button class="category-btn glass rounded-full px-4 py-2 text-dark">帽子</button>
                    </div>
                </div>
            </div>

            <!-- 衣物展示 -->
            <div class="mb-8">
                <h2 class="text-lg font-bold text-dark mb-3">我的衣橱</h2>
                <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4">
                    <!-- 衣物卡片 -->
                    <div class="glass rounded-xl overflow-hidden card-hover transition-all">
                        <div class="h-40 bg-gray-200 flex items-center justify-center">
                            <i class="fa fa-tshirt text-4xl text-gray-400"></i>
                        </div>
                        <div class="p-3">
                            <h3 class="font-medium text-dark">白色T恤</h3>
                            <p class="text-sm text-gray-600">休闲</p>
                        </div>
                    </div>
                    <div class="glass rounded-xl overflow-hidden card-hover transition-all">
                        <div class="h-40 bg-gray-200 flex items-center justify-center">
                            <i class="fa fa-pants text-4xl text-gray-400"></i>
                        </div>
                        <div class="p-3">
                            <h3 class="font-medium text-dark">牛仔裤</h3>
                            <p class="text-sm text-gray-600">休闲</p>
                        </div>
                    </div>
                    <div class="glass rounded-xl overflow-hidden card-hover transition-all">
                        <div class="h-40 bg-gray-200 flex items-center justify-center">
                            <i class="fa fa-shoe-prints text-4xl text-gray-400"></i>
                        </div>
                        <div class="p-3">
                            <h3 class="font-medium text-dark">小白鞋</h3>
                            <p class="text-sm text-gray-600">休闲</p>
                        </div>
                    </div>
                    <div class="glass rounded-xl overflow-hidden card-hover transition-all">
                        <div class="h-40 bg-gray-200 flex items-center justify-center">
                            <i class="fa fa-plus text-4xl text-gray-400"></i>
                        </div>
                        <div class="p-3 text-center">
                            <h3 class="font-medium text-dark">添加衣物</h3>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 推荐穿搭 -->
            <div>
                <h2 class="text-lg font-bold text-dark mb-3">今日推荐</h2>
                <div class="overflow-x-auto">
                    <div class="flex space-x-4 pb-4">
                        <!-- 穿搭卡片 -->
                        <div class="glass rounded-xl p-4 min-w-[200px] card-hover transition-all">
                            <div class="h-32 bg-gray-200 rounded-lg mb-3 flex items-center justify-center">
                                <i class="fa fa-outfit text-3xl text-gray-400"></i>
                            </div>
                            <h3 class="font-medium text-dark mb-1">日常穿搭</h3>
                            <p class="text-sm text-gray-600 mb-2">适合22°C晴天</p>
                            <div class="flex space-x-2">
                                <span class="text-xs bg-primary/20 text-primary px-2 py-1 rounded-full">休闲</span>
                                <span class="text-xs bg-secondary/20 text-secondary px-2 py-1 rounded-full">舒适</span>
                            </div>
                        </div>
                        <div class="glass rounded-xl p-4 min-w-[200px] card-hover transition-all">
                            <div class="h-32 bg-gray-200 rounded-lg mb-3 flex items-center justify-center">
                                <i class="fa fa-dance text-3xl text-gray-400"></i>
                            </div>
                            <h3 class="font-medium text-dark mb-1">舞蹈穿搭</h3>
                            <p class="text-sm text-gray-600 mb-2">适合爵士舞</p>
                            <div class="flex space-x-2">
                                <span class="text-xs bg-accent/20 text-accent px-2 py-1 rounded-full">运动</span>
                                <span class="text-xs bg-red/20 text-red px-2 py-1 rounded-full">灵活</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- 底部导航 -->
        <footer class="fixed bottom-0 left-0 right-0 glass border-t border-white/20">
            <div class="container mx-auto">
                <div class="flex justify-around items-center h-16">
                    <button class="nav-item active flex flex-col items-center justify-center">
                        <i class="fa fa-home text-xl"></i>
                        <span class="text-xs mt-1">首页</span>
                    </button>
                    <button class="nav-item flex flex-col items-center justify-center">
                        <i class="fa fa-wardrobe text-xl"></i>
                        <span class="text-xs mt-1">衣橱</span>
                    </button>
                    <button class="nav-item flex flex-col items-center justify-center">
                        <div class="w-12 h-12 bg-gradient-to-r from-primary to-secondary rounded-full flex items-center justify-center -mt-4">
                            <i class="fa fa-plus text-white text-xl"></i>
                        </div>
                        <span class="text-xs mt-1">添加</span>
                    </button>
                    <button class="nav-item flex flex-col items-center justify-center">
                        <i class="fa fa-calendar text-xl"></i>
                        <span class="text-xs mt-1">计划</span>
                    </button>
                    <button class="nav-item flex flex-col items-center justify-center">
                        <i class="fa fa-user text-xl"></i>
                        <span class="text-xs mt-1">我的</span>
                    </button>
                </div>
            </div>
        </footer>
    </div>

    <!-- JavaScript -->
    <script>
        // 页面加载完成后执行
        document.addEventListener('DOMContentLoaded', function() {
            // 检查本地存储中是否有用户信息
            const userInfo = localStorage.getItem('userInfo');
            
            if (userInfo) {
                // 有用户信息，显示主页面
                document.getElementById('welcome-page').classList.add('hidden');
                document.getElementById('main-page').classList.remove('hidden');
                // 加载用户信息
                loadUserInfo();
                // 加载天气信息
                loadWeather();
            } else {
                // 无用户信息，显示欢迎页面
                document.getElementById('welcome-page').classList.remove('hidden');
                document.getElementById('main-page').classList.add('hidden');
                // 绑定表单事件
                bindFormEvents();
            }
        });

        // 绑定表单事件
        function bindFormEvents() {
            const form = document.getElementById('user-info-form');
            const bodyTypeBtns = document.querySelectorAll('.body-type-btn');
            const styleBtns = document.querySelectorAll('.style-btn');
            
            // 身材类型选择
            let selectedBodyType = '';
            bodyTypeBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    // 移除所有按钮的选中状态
                    bodyTypeBtns.forEach(b => b.classList.remove('bg-white/50'));
                    // 添加当前按钮的选中状态
                    this.classList.add('bg-white/50');
                    // 保存选中的身材类型
                    selectedBodyType = this.dataset.type;
                });
            });
            
            // 风格偏好选择
            const selectedStyles = [];
            styleBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    const style = this.dataset.style;
                    // 切换选中状态
                    if (selectedStyles.includes(style)) {
                        // 移除
                        const index = selectedStyles.indexOf(style);
                        selectedStyles.splice(index, 1);
                        this.classList.remove('bg-white/50');
                    } else {
                        // 添加
                        selectedStyles.push(style);
                        this.classList.add('bg-white/50');
                    }
                });
            });
            
            // 表单提交
            form.addEventListener('submit', function(e) {
                e.preventDefault();
                
                // 收集表单数据
                const userInfo = {
                    height: document.getElementById('height').value,
                    weight: document.getElementById('weight').value,
                    bodyType: selectedBodyType,
                    stylePreferences: selectedStyles,
                    danceClass: {
                        type: document.getElementById('dance-type').value,
                        day: document.getElementById('dance-day').value,
                        time: document.getElementById('dance-time').value
                    },
                    commute: {
                        byBike: document.getElementById('by-bike').checked,
                        hasGym: document.getElementById('has-gym').checked
                    }
                };
                
                // 保存到本地存储
                localStorage.setItem('userInfo', JSON.stringify(userInfo));
                
                // 显示主页面
                document.getElementById('welcome-page').classList.add('hidden');
                document.getElementById('main-page').classList.remove('hidden');
                
                // 加载用户信息
                loadUserInfo();
                // 加载天气信息
                loadWeather();
            });
        }

        // 加载用户信息
        function loadUserInfo() {
            // 这里可以根据需要加载用户信息并显示
            console.log('加载用户信息');
        }

        // 加载天气信息
        function loadWeather() {
            // 模拟天气数据
            document.getElementById('temperature').textContent = '22°C';
            document.getElementById('weather-desc').textContent = '晴天';
            
            // 实际项目中可以使用OpenWeatherMap API获取真实天气
            // fetch('https://api.openweathermap.org/data/2.5/weather?q=Beijing&appid=YOUR_API_KEY&units=metric')
            //     .then(response => response.json())
            //     .then(data => {
            //         document.getElementById('temperature').textContent = `${Math.round(data.main.temp)}°C`;
            //         document.getElementById('weather-desc').textContent = data.weather[0].description;
            //     })
            //     .catch(error => console.error('获取天气失败:', error));
        }

        // 绑定导航事件
        document.addEventListener('DOMContentLoaded', function() {
            const navBtns = document.querySelectorAll('.nav-btn');
            const navItems = document.querySelectorAll('.nav-item');
            
            navBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    // 这里可以添加导航逻辑
                    console.log('点击导航按钮');
                });
            });
            
            navItems.forEach(item => {
                item.addEventListener('click', function() {
                    // 移除所有导航项的激活状态
                    navItems.forEach(i => i.classList.remove('active'));
                    // 添加当前导航项的激活状态
                    this.classList.add('active');
                });
            });
        });

        // 注册Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/service-worker.js')
                    .then((registration) => {
                        console.log('Service Worker registered:', registration);
                    })
                    .catch((error) => {
                        console.log('Service Worker registration failed:', error);
                    });
            });
        }
    </script>
</body>
</html>
